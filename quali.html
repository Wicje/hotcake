<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Initiate Protocol - DNA Authority</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        :root {
            --electric-red: #FF1F1F;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .input-glow:focus {
            box-shadow: 0 0 15px rgba(255, 31, 31, 0.2);
            border-color: var(--electric-red);
        }

        /* Scanline effect */
        .scanline {
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.5) 50%);
            background-size: 100% 4px;
            pointer-events: none;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#050505',
                        foreground: '#ffffff',
                        primary: '#FF1F1F',
                        muted: '#171717',
                        'muted-foreground': '#a3a3a3',
                    },
                    animation: {
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-foreground min-h-screen flex items-center justify-center p-4 md:p-8 relative overflow-hidden" data-ray-id="smyaib">

    <!-- Background Grid -->

                <div class="flex items-center gap-2 text-primary font-mono text-xs mb-8" data-ray-id="dtrp8k">

                    SYSTEM_STATUS: ONLINE

                        <span data-ray-id="v83ijd">ENCRYPTION</span>

                        <span class="text-green-500" data-ray-id="3cgki8">12ms</span>

                    <div class="flex justify-between border-b border-white/5 pb-2" data-ray-id="ckk5no">

                        <span class="text-white" data-ray-id="55hgyb">US-EAST-1</span>

                </div>
                <div class="flex justify-between mt-2 text-[10px] font-mono text-muted-foreground uppercase" data-ray-id="66htjy">

                    <span data-ray-id="roqm8n">Identity Verification</span>

                <div class="space-y-2" data-ray-id="8cz1sm">
                    <label class="block text-xs font-mono text-primary uppercase tracking-wider" data-ray-id="327wez">01 // LinkedIn Profile</label>

                <!-- Input Group 2 -->

                    <div class="grid grid-cols-2 gap-4" data-ray-id="s0cw9u">

                        <label class="cursor-pointer" data-ray-id="ol178w">
                            <input type="radio" name="stage" class="peer sr-only" data-ray-id="foeb0e" />
                            <div class="border border-white/10 rounded px-4 py-3 text-sm text-center text-muted-foreground peer-checked:bg-primary/10 peer-checked:border-primary peer-checked:text-primary transition-all hover:bg-white/5" data-ray-id="6f5gkb">
                                Series A+

                </div>

                <!-- Input Group 3 -->
                <div class="space-y-2" data-ray-id="3vg9qz">
                    <label class="block text-xs font-mono text-muted-foreground uppercase tracking-wider" data-ray-id="grwmwp">03 // Primary Objective</label>
                    <select class="w-full bg-muted/30 border border-white/10 rounded px-4 py-3 text-white focus:outline-none input-glow transition-all font-mono text-sm appearance-none cursor-pointer hover:bg-white/5" data-ray-id="d7vz59">

                        <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" data-ray-id="ogz9og"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" data-ray-id="fyikws"/></svg>
                    </button>
                    <p class="text-center text-[10px] text-muted-foreground mt-4 font-mono" data-ray-id="u4rip1">
                        // SECURE CONNECTION ESTABLISHED
                    </p>
                </div>

            </form>
        </div>
    </div>

</body>
</html>
